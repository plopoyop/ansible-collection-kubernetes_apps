---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'clamav' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "clamav"
      register: namespace_clamav
      until: namespace_clamav.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'clamav' namespace is removed."
      ansible.builtin.assert:
        that: namespace_clamav.resources | length == 0
        fail_msg: "Namespace 'clamav' is still present."
