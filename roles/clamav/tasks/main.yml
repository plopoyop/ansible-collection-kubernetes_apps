---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks: "setup.yml"
  when: clamav_enabled
  tags:
    - "clamav"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks: "cleanup.yml"
  when: not clamav_enabled
  tags:
    - "clamav"
    - "uninstall"
