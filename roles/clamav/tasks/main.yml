---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "clamav"
        - "install"
  when: clamav_enabled
  tags:
    - "clamav"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "clamav"
        - "uninstall"
  when: not clamav_enabled
  tags:
    - "clamav"
    - "uninstall"
