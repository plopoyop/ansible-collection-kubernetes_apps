---
- name: "Uninstall Headlamp helm package"
  kubernetes.core.helm:
    name: "{{ headlamp_deployment_name }}"
    namespace: "{{ headlamp_namespace }}"
    state: "absent"
    chart_ref: "{{ headlamp_helm_chart_ref }}"
    chart_version: "{{ headlamp_helm_chart_version }}"
    wait: true

- name: "Remove Headlamp helm repo"
  kubernetes.core.helm_repository:
    name: "{{ headlamp_helm_repo_name }}"
    repo_url: "{{ headlamp_helm_repo_url }}"
    state: "absent"

- name: "Remove Headlamp namespace"
  kubernetes.core.k8s:
    name: "{{ headlamp_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "absent"
