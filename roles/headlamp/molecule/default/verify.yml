---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Pause for resources to be created."
      ansible.builtin.pause:
        seconds: 5

    - name: "Get 'headlamp' namespace info."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "headlamp"
      register: namespace_headlamp

    - name: "Assert that 'headlamp' namespace is active"
      ansible.builtin.assert:
        that: namespace_headlamp['resources'][0]['status']['phase'] == "Active"

    - name: "Get 'headlamp' Deployment info."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "headlamp"
        namespace: "headlamp"
      register: headlamp_deployment

    - name: "Assert that 'headlamp' Deployment is deployed"
      ansible.builtin.assert:
        that: headlamp_deployment['resources'] | length > 0

    - name: "Assert that 'headlamp' Deployment has correct replicas spec"
      ansible.builtin.assert:
        that: headlamp_deployment['resources'][0]['spec']['replicas'] == 1
