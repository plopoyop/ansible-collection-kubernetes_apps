---
- name: "Prepare"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # bcrypt hash for "molecule-admin-password"
    kargo_api_admin_password_hash: "$2a$10$Zrpo7AbzKCS24M77eEHo/.0XAuLeRGEZAkPJBnDR9LdGGtfCYxg9q"
    kargo_api_admin_token_signing_key: "molecule-token-signing-key-32chars"
  tasks:
    - name: "Add jetstack helm repo"
      kubernetes.core.helm_repository:
        name: "jetstack"
        repo_url: "https://charts.jetstack.io"

    - name: "Install cert-manager (Kargo prerequisite)"
      kubernetes.core.helm:
        name: "cert-manager"
        namespace: "cert-manager"
        chart_ref: "jetstack/cert-manager"
        chart_version: "v1.20.2"
        create_namespace: true
        update_repo_cache: true
        wait: true
        values:
          crds:
            enabled: true

    - name: "Install Kargo (so cleanup has something to remove)"
      ansible.builtin.import_role:
        name: "kargo"
