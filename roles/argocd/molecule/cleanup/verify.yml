---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'argocd' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "argocd"
      register: namespace_argocd
      until: namespace_argocd.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'argocd' namespace is removed."
      ansible.builtin.assert:
        that: namespace_argocd.resources | length == 0
        fail_msg: "Namespace 'argocd' is still present."
