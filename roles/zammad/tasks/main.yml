---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "zammad"
        - "install"
  when: zammad_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "zammad"
        - "uninstall"
  when: not zammad_enabled
  tags: ["always"]
