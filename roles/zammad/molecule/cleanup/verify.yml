---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'nginx' deployment to be removed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "zammad-nginx"
        namespace: "zammad"
      register: nginx_deployment
      until: nginx_deployment.resources | length == 0
      retries: 30
      delay: 5

    - name: "Assert that 'nginx' is removed."
      ansible.builtin.assert:
        that: nginx_deployment.resources | length == 0
        fail_msg: "Deployment 'zammad-nginx' is still present."

    - name: "Wait for 'memcached' deployment to be removed."
      kubernetes.core.k8s_info:
        kind: "Deployment"
        name: "zammad-memcached"
