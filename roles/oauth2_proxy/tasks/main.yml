---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "oauth2_proxy"
        - "install"
  when: oauth2_proxy_enabled
  tags:
    - "oauth2_proxy"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "oauth2_proxy"
        - "uninstall"
  when: not oauth2_proxy_enabled
  tags:
    - "oauth2_proxy"
    - "uninstall"
