---
- name: "Create Warpgate namespace"
  kubernetes.core.k8s:
    name: "{{ warpgate_namespace }}"
    api_version: "v1"
    kind: "Namespace"
    state: "present"
  tags:
    - "namespace"

- name: "Create Warpgate setup credentials secret"
  kubernetes.core.k8s:
    state: "present"
    definition: "{{ lookup('ansible.builtin.template', 'secret-setup.yml.j2') | ansible.builtin.from_yaml }}"
  when: warpgate_setup_enabled and warpgate_admin_password | default('') | length > 0
  no_log: true
  tags:
    - "manifest"

- name: "Create extra manifests"
  kubernetes.core.k8s:
    namespace: "{{ warpgate_namespace }}"
    state: "present"
    definition: "{{ warpgate_manifest_to_create }}"
  loop: "{{ warpgate_extra_manifests }}"
  loop_control:
    loop_var: warpgate_manifest_to_create
  when: warpgate_extra_manifests | length > 0
  tags:
    - "manifest"

- name: "Check for existing Warpgate setup job"
  kubernetes.core.k8s_info:
    api_version: "batch/v1"
    kind: "Job"
    name: "{{ warpgate_deployment_name }}-setup-job"
    namespace: "{{ warpgate_namespace }}"
  register: warpgate_existing_setup_job
  check_mode: false
  failed_when: false
  when: warpgate_setup_enabled and warpgate_setup_type == "job"
  tags:
    - "helm_chart"

- name: "Delete existing Warpgate setup job"
  kubernetes.core.k8s:
    api_version: "batch/v1"
    kind: "Job"
    name: "{{ warpgate_deployment_name }}-setup-job"
    namespace: "{{ warpgate_namespace }}"
    state: "absent"
    wait: true
  when:
    - warpgate_setup_enabled
    - warpgate_setup_type == "job"
    - warpgate_force_upgrade | default(false)
    - (warpgate_existing_setup_job.resources | default([])) | length > 0
  tags:
    - "helm_chart"

- name: "Install Warpgate helm package"
  kubernetes.core.helm:
    name: "{{ warpgate_deployment_name }}"
    namespace: "{{ warpgate_namespace }}"
    state: "present"
    chart_ref: "{{ warpgate_helm_chart_ref }}"
    chart_version: "{{ warpgate_helm_chart_version }}"
    values: "{{ lookup('ansible.builtin.template', 'warpgate_helm_values.yml.j2') | ansible.builtin.from_yaml }}"
    wait: "{{ warpgate_wait_install }}"
  tags:
    - "helm_chart"
