---
- name: "Uninstall Warpgate helm package"
  kubernetes.core.helm:
    name: "{{ warpgate_deployment_name }}"
    namespace: "{{ warpgate_namespace }}"
    state: "absent"
    chart_ref: "{{ warpgate_helm_chart_ref }}"
    chart_version: "{{ warpgate_helm_chart_version }}"
    wait: true
  tags:
    - "helm_chart"

- name: "Remove Warpgate extra manifests"
  kubernetes.core.k8s:
    namespace: "{{ warpgate_namespace }}"
    state: "absent"
    definition: "{{ warpgate_manifest_to_remove }}"
  loop: "{{ warpgate_extra_manifests }}"
  loop_control:
    loop_var: warpgate_manifest_to_remove
  when: warpgate_extra_manifests | length > 0
  tags:
    - "manifest"

- name: "Remove Warpgate setup credentials secret"
  kubernetes.core.k8s:
    api_version: "v1"
    kind: "Secret"
    name: "{{ warpgate_deployment_name }}-setup-credentials"
    namespace: "{{ warpgate_namespace }}"
    state: "absent"
  tags:
    - "manifest"

- name: "Remove Warpgate namespace"
  kubernetes.core.k8s:
    api_version: "v1"
    kind: "Namespace"
    name: "{{ warpgate_namespace }}"
    state: "absent"
  tags:
    - "namespace"
