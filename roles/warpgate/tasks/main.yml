---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "warpgate"
        - "install"
  when: warpgate_enabled
  tags:
    - "warpgate"
    - "install"

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "warpgate"
        - "uninstall"
  when: not warpgate_enabled
  tags:
    - "warpgate"
    - "uninstall"
