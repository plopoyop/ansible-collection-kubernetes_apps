---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "gatus"
        - "install"
  when: gatus_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "gatus"
        - "uninstall"
  when: not gatus_enabled
  tags: ["always"]
