---
- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: "Wait for 'gatus' namespace to be removed."
      kubernetes.core.k8s_info:
        kind: Namespace
        name: "gatus"
      register: namespace_gatus
      until: namespace_gatus.resources | length == 0
      retries: 30
      delay: 5
      changed_when: false

    - name: "Assert that 'gatus' namespace is removed."
      ansible.builtin.assert:
        that: namespace_gatus.resources | length == 0
        fail_msg: "Namespace 'gatus' is still present."
