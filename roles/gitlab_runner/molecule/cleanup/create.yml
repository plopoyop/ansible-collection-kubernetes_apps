---
- name: "Create"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gitlab_runner_token: "molecule-fake-runner-token"
    gitlab_runner_gitlab_url: "https://gitlab.example.com/"
    gitlab_runner_wait_install: false
  tasks:
    - name: "Build a kind cluster (wait for control plane)."
      ansible.builtin.command: >-
        kind create cluster
        --wait 300s
        --name molecule-test
        --kubeconfig {{ kubeconfig }}
      changed_when: true

    - name: "Install GitLab Runner first"
      ansible.builtin.import_role:
        name: "gitlab_runner"
