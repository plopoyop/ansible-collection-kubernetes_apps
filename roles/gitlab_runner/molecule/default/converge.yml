---
- name: "Converge"
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    gitlab_runner_token: "molecule-fake-runner-token"
    gitlab_runner_gitlab_url: "https://gitlab.example.com/"
    gitlab_runner_wait_install: false
  tasks:
    - name: "Install GitLab Runner"
      ansible.builtin.import_role:
        name: "gitlab_runner"
