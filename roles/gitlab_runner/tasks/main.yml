---
- name: "Include setup when enabled"
  ansible.builtin.include_tasks:
    file: "setup.yml"
    apply:
      tags:
        - "gitlab_runner"
        - "install"
  when: gitlab_runner_enabled
  tags: ["always"]

- name: "Include cleanup when disabled"
  ansible.builtin.include_tasks:
    file: "cleanup.yml"
    apply:
      tags:
        - "gitlab_runner"
        - "uninstall"
  when: not gitlab_runner_enabled
  tags: ["always"]
